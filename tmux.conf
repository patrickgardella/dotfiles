# Create a new session when using tmux a
new-session

# Allow using the mouse
set -g mouse

# Keep a good long history
set -g history-limit 30000

bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clipboard

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Update default binding of `Enter` to also use copy-pipe
# Uses pbcopy on macOS, xclip on Linux, clip.exe on WSL
unbind -T copy-mode-vi Enter
if-shell 'uname | grep -q Darwin' {
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  if-shell 'grep -qi microsoft /proc/version 2>/dev/null' {
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"
  } {
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  }
}

# Make `Ctrl+B R` reload the config file
unbind r
bind r source-file ~/.tmux.conf \; display-message "source-file reloaded"

# TMS Specific keys (only if tms is installed)
if-shell 'command -v tms >/dev/null 2>&1' {
  bind C-o display-popup -E "tms"
  bind C-j display-popup -E "tms switch"
  bind C-w display-popup -E "tms windows"
  bind C-r run-shell "tms refresh" \; display-message "tms refreshed"
}
