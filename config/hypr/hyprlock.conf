general {
    hide_cursor = true
    ignore_empty_input = false
    grace = 0
}

animations {
    enabled = false
}

background {
    monitor =
    path = screenshot
    color = rgba(22, 20, 26, 1)
    blur_passes = 2
    blur_size = 6
    noise = 0.01
    contrast = 0.8
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 8
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(167, 137, 127, 1)
    inner_color = rgba(22, 20, 26, 1)
    font_color = rgba(255, 255, 255, 1)
    halign = center
    valign = center
    fade_on_empty = false
    placeholder_text = <i>Password...</i>

    fail_color = rgba(19, 14, 35, 1)
    fail_text = <b>Wrong</b>

    check_color = rgba(76, 61, 119, 1)
}
